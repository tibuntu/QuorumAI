services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/app.db"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "http://localhost:3000"
    volumes:
      - quorum-data:/data
volumes:
  quorum-data:
